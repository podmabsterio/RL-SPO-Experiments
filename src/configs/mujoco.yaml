defaults:
  - model: mlp3
  - env: mujoco_env
  - _self_
optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4
lr_scheduler:
  
policy_loss:
  _target_: src.loss.PPOLoss
  eps: 1337
value_loss:
  _target_: src.loss.MSEValueLoss

seed: 42
output_dir: saved
device: "cpu"
project_name: "rl_experiments"
run_name: "test"
trainer:
  num_epochs: 42
  num_minibatches: 42
  rollout_steps: 42
  total_timesteps: 42
  gamma: 42
  gae_lambda: 42
  normalize_advantages: true
  value_coef: 0.42
  entropy_coef: 0.42
  max_grad_norm: 5