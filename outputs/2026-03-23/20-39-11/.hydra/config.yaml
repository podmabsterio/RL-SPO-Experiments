model:
  _target_: src.model.NormalActionsMLP
  actor_hidden_dims:
  - 64
  - 64
env:
  _target_: MujocoEnvFactory
  num_envs: 10
  env_id: 10
  gamma: 10
optimizer:
  _target_: torch.optim.Adam
  lr: 0.0003
policy_loss:
  _target_: src.loss.PPOLoss
  eps: 1337
value_loss:
  _target_: src.loss.MSEValueLoss
seed: 42
output_dir: saved
device: cpu
trainer:
  num_epochs: 42
  num_minibatches: 42
  rollout_steps: 42
  total_timesteps: 42
  gamma: 42
  gae_lambda: 42
  normalize_advantages: true
  value_coef: 0.42
  entropy_coef: 0.42
  max_grad_norm: 5
